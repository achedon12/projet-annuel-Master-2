# Production stack — builds and runs backend + frontend + database as containers.
#
#   docker compose -f docker-compose.prod.yml up -d --build
#
# The dev stack (docker-compose.yml) only brings up infra (MySQL + phpMyAdmin +
# MailHog) because in dev the two apps run on the host. This file is the full
# containerised deployment: no phpMyAdmin, no MailHog, a persisted named volume,
# restart policies and prod env vars.
services:

  database:
    env_file:
      - .env
    image: mysql:9.1
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./backend/.env.local
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      DATABASE_URL: "mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@database:3306/${MYSQL_DATABASE}?serverVersion=9.1&charset=utf8mb4"
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-^https?://localhost(:[0-9]+)?$$}
    depends_on:
      database:
        condition: service_healthy
    # Install prod deps, run pending migrations, then serve. `php -S` is fine for
    # a small deployment; front a real FPM+nginx here if you scale it up.
    command: >
      sh -c "composer install --no-dev --optimize-autoloader --no-interaction &&
             php bin/console doctrine:migrations:migrate --no-interaction &&
             php -S 0.0.0.0:8000 -t public"
    ports:
      - "8000:8000"
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    restart: always
    env_file:
      - ./frontend/.env.local
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - app-network

volumes:
  db-data:

networks:
  app-network:
    driver: bridge
