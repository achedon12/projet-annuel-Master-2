# Production stack — builds and runs backend + frontend + database as containers.
#
#   docker compose up -d --build
#
# The dev stack (docker-compose.dev.yml) only brings up infra (MySQL + phpMyAdmin
# + MailHog) because in dev the two apps run on the host. This file is the full
# containerised deployment: no phpMyAdmin, no MailHog, restart policies and prod
# env vars. Rebuild after changing app code — nothing is bind-mounted.
services:

  pjr_database:
    env_file:
      - .env
    container_name: pjr_database
    image: mysql:9.1
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
    # Loopback uniquement : les conteneurs joignent la base par le réseau Docker
    # interne (pjr_database:3306), pas par ce mapping. Il ne sert qu'à un client
    # SQL depuis le serveur lui-même. DOCKER_MYSQL_PORT = un simple numéro.
    ports:
      - "127.0.0.1:${DOCKER_MYSQL_PORT}:3306"
    volumes:
      - ./db:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  pjr_backend:
    container_name: pjr_backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    # Override de dev, gitignoré donc absent du serveur : optionnel, sinon le
    # déploiement échoue sur un fichier manquant. Les secrets prod passent par
    # `environment` / le .env racine.
    env_file:
      - ./backend/.env
      - path: ./backend/.env.local
        required: false
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      DATABASE_URL: "mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@pjr_database:3306/${MYSQL_DATABASE}?serverVersion=9.1&charset=utf8mb4"
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-^https?://localhost(:[0-9]+)?$$}
    depends_on:
      pjr_database:
        condition: service_healthy
    # No source bind mount: the image already contains the code and vendor/.
    # Mounting ./backend here would shadow both and break the container.
    # Deps are baked into the image, so this only migrates and serves. `php -S`
    # is fine for a small deployment; front a real FPM+nginx here if you scale up.
    command: >
      sh -c "php bin/console doctrine:migrations:migrate --no-interaction &&
             php -S 0.0.0.0:8000 -t public"
    # Publié sur la loopback uniquement : seul nginx (sur l'hôte) y accède, et
    # doit donc proxy_pass vers 127.0.0.1:8000. Empêche de joindre l'API en clair
    # sur http://<IP>:8000 en contournant le TLS. "8000:8000" rouvrirait ce trou.
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - app-network

  pjr_frontend:
    container_name: pjr_frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    restart: always
    # .env is NOT baked into the image (the runner stage only copies the build
    # output), so it must be injected here or NextAuth aborts with NO_SECRET.
    # .env.local comes last: it overrides .env, same precedence as on the host.
    # Il est `required: false` car c'est un fichier d'override de dev, absent
    # en prod (gitignoré) : sans ça, le déploiement échouerait sur son absence.
    env_file:
      - path: ./frontend/.env
        required: true
      - path: ./frontend/.env.local
        required: false
    environment:
      NODE_ENV: production
      # Doit valoir la même chose que le build arg ci-dessus : sinon le rendu
      # serveur et le bundle navigateur viseraient deux URL différentes.
      # (`environment` a la priorité sur `env_file`, qui fixe localhost.)
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      # NEXT_PUBLIC_API_URL est l'URL vue par le navigateur. Le code serveur
      # (authorize() de NextAuth) tourne dans ce conteneur, où localhost n'est
      # pas le backend : il lui faut le nom de service Docker.
      INTERNAL_API_URL: http://pjr_backend:8000
    depends_on:
      - pjr_backend
    # No source bind mount: `next build` already produced .next/ inside the
    # image. Mounting ./frontend here would shadow it and `next start` would
    # find no production build.
    # Loopback uniquement : nginx (hôte) proxy https://<domaine>/ vers ce port.
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
